name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  label-check:
    name: Require release label
    runs-on: ubuntu-latest
    steps:
      - name: Check for release label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const releaseLabels = ['release:patch', 'release:minor', 'release:major'];
            const hasLabel = releaseLabels.some(l => labels.includes(l));
            if (!hasLabel) {
              core.setFailed(
                'Pull request must have exactly one release label: ' +
                releaseLabels.join(', ')
              );
            } else {
              const found = releaseLabels.filter(l => labels.includes(l));
              core.info(`Release label found: ${found.join(', ')}`);
            }

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run python -m pytest tests/ -v --tb=short

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build wheel and sdist
        run: uv build

      - name: Verify dist artifacts
        run: ls -la dist/
