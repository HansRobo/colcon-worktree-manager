name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  release:
    name: Bump version and create release
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            let bump = '';
            if (context.eventName === 'workflow_dispatch') {
              bump = context.payload.inputs.bump;
              core.info(`workflow_dispatch bump: ${bump}`);
            } else {
              const labels = context.payload.pull_request.labels.map(l => l.name);
              if (labels.includes('release:major')) {
                bump = 'major';
              } else if (labels.includes('release:minor')) {
                bump = 'minor';
              } else if (labels.includes('release:patch')) {
                bump = 'patch';
              }
              if (!bump) {
                core.warning('No release label found on merged PR. Skipping release.');
              } else {
                core.info(`Bump type: ${bump}`);
              }
            }
            core.setOutput('type', bump);

      - name: Compute next version
        if: steps.bump.outputs.type != ''
        id: version
        run: |
          BUMP_TYPE="${{ steps.bump.outputs.type }}"

          # Get latest tag (default to v0.0.0 if none)
          CURRENT=$(git tag --list 'v*' --sort=-version:refname | head -1)
          CURRENT="${CURRENT:-v0.0.0}"
          CURRENT="${CURRENT#v}"
          echo "Current version: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git
        if: steps.bump.outputs.type != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.bump.outputs.type != ''
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.bump.outputs.type != ''
        uses: actions/github-script@v7
        with:
          script: |
            const tag = "${{ steps.version.outputs.tag }}";
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
            });
            core.info(`Created release: ${release.html_url}`);

      # Uncomment to publish to PyPI when ready:
      # - uses: astral-sh/setup-uv@v5
      #   if: steps.bump.outputs.type != ''
      #   with:
      #     version: "latest"
      #
      # - name: Build and publish to PyPI
      #   if: steps.bump.outputs.type != ''
      #   run: |
      #     uv build
      #     uv publish
      #   env:
      #     UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
